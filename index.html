<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Этот тег нужен, чтобы сайт красиво отображался и на телефонах, и на компьютерах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой первый сайт</title>
    <style>
        /* Здесь настраивается внешний вид (дизайн) сайта */
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #1e1e24; 
            color: #fff;
            padding: 50px 20px; 
        }
        h1 { color: #4caf50; }
        .card {
            background: #2a2a35;
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Привет, мир! 🚀</h1>
        <p>Я учусь на программиста и создал этот сайт прямо со своего телефона.</p>
    </div>

</body>
</html>
